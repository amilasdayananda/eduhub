<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduHub Ultra | Multi-Format</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary: #6366f1; }
        body { background: #f9fafb; font-family: 'Inter', sans-serif; }
        
        /* Modern Floating Header */
        .search-nav {
            position: sticky; top: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb;
            padding: 20px 0; z-index: 1000;
        }
        .search-pill {
            background: #fff; border-radius: 50px; border: 1px solid #d1d5db;
            padding: 10px 25px; max-width: 600px; margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .search-pill input { border: none; outline: none; width: 100%; font-size: 1.1rem; }

        /* Filter Chips */
        .chip { cursor: pointer; padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; border: 1px solid #e5e7eb; background: #fff; transition: 0.2s; color: #6b7280; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .res-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #f1f5f9; height: 100%; transition: 0.3s; }
        .res-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .type-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: 15px; }
        .bg-pdf { background: #fee2e2; color: #ef4444; }
        .bg-excel { background: #dcfce7; color: #16a34a; }
        .bg-document { background: #e0f2fe; color: #0284c7; }
        .bg-video { background: #ffedd5; color: #ea580c; }
    </style>
</head>
<body>

<div class="search-nav">
    <div class="container text-center">
        <h4 class="fw-bold mb-3 text-indigo-600">EduHub Ultra</h4>
        <div class="search-pill d-flex align-items-center mb-3">
            <i class="bi bi-search text-muted me-2"></i>
            <input type="text" id="qInput" placeholder="Enter topic (e.g. 'Financial Analysis')">
        </div>
        
        <div class="d-flex justify-content-center gap-2 mb-2">
            <div class="chip active l-c" onclick="filter(this, 'level', 'Beginner')">Beginner</div>
            <div class="chip l-c" onclick="filter(this, 'level', 'Intermediate')">Intermediate</div>
            <div class="chip l-c" onclick="filter(this, 'level', 'Expert')">Expert</div>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <div class="chip active t-c" onclick="filter(this, 'type', 'all')">All</div>
            <div class="chip t-c" onclick="filter(this, 'type', 'pdf')">PDF</div>
            <div class="chip t-c" onclick="filter(this, 'type', 'excel')">Excel</div>
            <div class="chip t-c" onclick="filter(this, 'type', 'document')">Docs</div>
            <div class="chip t-c" onclick="filter(this, 'type', 'video')">Videos</div>
        </div>
    </div>
</div>

<div class="container py-5">
    <div id="grid" class="row g-4"></div>
</div>

<script>
let state = { q: '', level: 'Beginner', type: 'all' };
const input = document.getElementById('qInput');
const grid = document.getElementById('grid');

function filter(el, cat, val) {
    document.querySelectorAll(`.${cat[0]}-c`).forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    state[cat] = val;
    if(state.q.length > 2) performSearch();
}

input.addEventListener('input', (e) => {
    state.q = e.target.value;
    if(state.q.length < 3) return;
    clearTimeout(window.sTimer);
    window.sTimer = setTimeout(performSearch, 800);
});

async function performSearch() {
    grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Indexing multi-format resources...</p></div>';
    
    const res = await fetch(`/api/search?q=${encodeURIComponent(state.q)}&level=${state.level}&type=${state.type}`);
    const data = await res.json();
    
    if(!data.length) {
        grid.innerHTML = '<div class="col-12 text-center py-5"><h5>No data found. Try broader keywords.</h5></div>';
        return;
    }

    grid.innerHTML = data.map(item => `
        <div class="col-md-6 col-lg-4">
            <div class="res-card shadow-sm">
                <div class="type-icon bg-${item.type}">
                    <i class="bi ${getIcon(item.type)}"></i>
                </div>
                <h6 class="fw-bold mb-1 text-truncate">${item.title}</h6>
                <div class="mt-3">
                    <span class="badge bg-light text-dark border text-uppercase">${item.type}</span>
                    <span class="badge bg-indigo-50 text-indigo-700">${item.level}</span>
                </div>
                <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm rounded-pill w-100 mt-3">Open Material</a>
            </div>
        </div>
    `).join('');
}

function getIcon(t) {
    const map = {'pdf': 'bi-file-pdf', 'excel': 'bi-file-earmark-excel', 'document': 'bi-file-word', 'video': 'bi-play-btn'};
    return map[t] || 'bi-journal-text';
}
</script>
</body>
</html>
