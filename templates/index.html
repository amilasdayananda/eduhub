<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduHub Pro | Global Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #6366f1; }
        body { background: #fdfdfd; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-glass { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid #eee; z-index: 1000; padding: 15px 0; }
        .search-pill { background: #fff; border-radius: 50px; border: 1px solid #e2e8f0; padding: 10px 25px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .search-pill input { border: none; outline: none; width: 100%; font-size: 1.1rem; }
        
        .filter-chip { cursor: pointer; padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; border: 1px solid #e2e8f0; background: #fff; transition: 0.3s; color: #64748b; }
        .filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }

        .res-card { background: #fff; border-radius: 24px; padding: 25px; border: 1px solid #f1f5f9; height: 100%; transition: all 0.4s ease; }
        .res-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .icon-sq { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 15px; }
        .bg-pdf { background: #fee2e2; color: #ef4444; }
        .bg-excel { background: #f0fdf4; color: #22c55e; }
        .bg-document { background: #eff6ff; color: #3b82f6; }
        .bg-video { background: #fff7ed; color: #f97316; }
        .bg-web { background: #f5f3ff; color: #7c3aed; }
        
        /* Video Embed Style */
        .video-thumb { border-radius: 12px; width: 100%; margin-bottom: 15px; background: #000; height: 150px; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

<nav class="nav-glass">
    <div class="container text-center">
        <h3 class="fw-bold mb-3">EduHub Pro.</h3>
        <div class="search-pill d-flex align-items-center mb-3">
            <i class="bi bi-search text-muted me-2"></i>
            <input type="text" id="qInput" placeholder="Enter topic (e.g. 'Advanced Python')">
        </div>
        
        <div class="d-flex justify-content-center gap-2 mb-3">
            <div class="filter-chip active l-chip" onclick="updateFilter(this, 'level', 'Beginner')">Beginner</div>
            <div class="filter-chip l-chip" onclick="updateFilter(this, 'level', 'Intermediate')">Intermediate</div>
            <div class="filter-chip l-chip" onclick="updateFilter(this, 'level', 'Expert')">Expert</div>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <div class="filter-chip active t-chip" onclick="updateFilter(this, 'type', 'all')">All</div>
            <div class="filter-chip t-chip" onclick="updateFilter(this, 'type', 'pdf')">PDF</div>
            <div class="filter-chip t-chip" onclick="updateFilter(this, 'type', 'excel')">Excel</div>
            <div class="filter-chip t-chip" onclick="updateFilter(this, 'type', 'document')">Docs</div>
            <div class="filter-chip t-chip" onclick="updateFilter(this, 'type', 'video')">Videos</div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div id="grid" class="row g-4"></div>
</div>

<script>
let state = { q: '', level: 'Beginner', type: 'all' };
const input = document.getElementById('qInput');
const grid = document.getElementById('grid');

function updateFilter(el, cat, val) {
    document.querySelectorAll(`.${cat[0]}-chip`).forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    state[cat] = val;
    if(state.q.length > 2) performSearch();
}

input.addEventListener('input', (e) => {
    state.q = e.target.value;
    if(state.q.length < 3) return;
    clearTimeout(window.sTimer);
    window.sTimer = setTimeout(performSearch, 800);
});

async function performSearch() {
    grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Mining global repositories...</p></div>';
    
    const res = await fetch(`/api/search?q=${encodeURIComponent(state.q)}&level=${state.level}&type=${state.type}`);
    const data = await res.json();
    
    grid.innerHTML = data.map(item => `
        <div class="col-md-6 col-lg-4">
            <div class="res-card">
                ${item.type === 'video' ? `<div class="video-thumb"><i class="bi bi-play-btn fs-1"></i></div>` : `<div class="icon-sq bg-${item.type}"><i class="bi ${getIcon(item.type)}"></i></div>`}
                <h6 class="fw-bold mb-1">${item.title}</h6>
                <div class="mt-3">
                    <span class="badge bg-light text-dark border text-uppercase">${item.type}</span>
                    <span class="badge bg-indigo-50 text-indigo-700">${item.level}</span>
                </div>
                <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm rounded-pill w-100 mt-3">${item.type === 'video' ? 'Watch Now' : 'Download Now'}</a>
            </div>
        </div>
    `).join('');
}

function getIcon(t) {
    const icons = {'pdf': 'bi-file-pdf', 'excel': 'bi-file-earmark-excel', 'document': 'bi-file-word', 'web': 'bi-globe', 'video': 'bi-play-btn'};
    return icons[t] || 'bi-journal-text';
}
</script>
</body>
</html>
