<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduHub | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #4f46e5; }
        body { background: #fdfdfd; font-family: 'Inter', sans-serif; }
        .hero { background: white; padding: 60px 0; border-bottom: 1px solid #eee; text-align: center; }
        .search-pill { max-width: 600px; margin: -30px auto 0; background: white; border-radius: 50px; padding: 12px 25px; border: 1px solid #ddd; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .search-pill input { border: none; outline: none; width: 100%; font-size: 1.1rem; }
        
        .res-card { background: white; border-radius: 20px; border: 1px solid #f0f0f0; padding: 20px; height: 100%; transition: 0.3s; }
        .res-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        
        /* Favorites Sidebar */
        .offcanvas { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .fav-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        
        iframe { width: 100%; height: 80vh; border-radius: 12px; border: none; }
    </style>
</head>
<body>

<div class="hero">
    <h1 class="fw-bold">EduHub. <span class="badge bg-primary fs-6">Pro</span></h1>
    <div class="search-pill d-flex align-items-center">
        <i class="bi bi-search me-2 text-muted"></i>
        <input type="text" id="qInput" placeholder="Search (e.g. 'Business Law PDF')">
        <button class="btn btn-sm btn-dark rounded-pill ms-2" data-bs-toggle="offcanvas" data-bs-target="#favSide" onclick="loadFavs()">
            <i class="bi bi-heart-fill me-1"></i> Saved
        </button>
    </div>
</div>

<div class="container mt-5"><div id="grid" class="row g-4"></div></div>

<div class="offcanvas offcanvas-end" id="favSide">
    <div class="offcanvas-header"><h5 class="fw-bold">My Favorites</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body" id="favList"></div>
</div>

<div class="modal fade" id="pModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header"><h6 class="modal-title fw-bold" id="vTitle"></h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-0"><iframe id="vFrame" src=""></iframe></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const input = document.getElementById('qInput');
const grid = document.getElementById('grid');
const vModal = new bootstrap.Modal(document.getElementById('pModal'));

input.addEventListener('input', async (e) => {
    const q = e.target.value.trim();
    if (q.length < 3) return;
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    grid.innerHTML = data.map(item => `
        <div class="col-md-6 col-lg-4">
            <div class="res-card shadow-sm">
                <div class="d-flex justify-content-between mb-2">
                    <span class="badge bg-light text-dark border text-uppercase">${item.file_type}</span>
                    <button class="btn btn-sm" onclick="saveFav('${item.title}', '${item.url}', '${item.file_type}')"><i class="bi bi-heart text-danger"></i></button>
                </div>
                <h6 class="fw-bold mb-1">${item.title}</h6>
                <p class="small text-muted mb-4">${item.source}</p>
                <div class="d-flex gap-2">
                    <button onclick="preview('${item.url}', '${item.file_type}', '${item.title.replace(/'/g, "")}')" class="btn btn-primary btn-sm rounded-pill w-100">Quick Preview</button>
                </div>
            </div>
        </div>
    `).join('');
});

async function saveFav(title, url, type) {
    await fetch('/api/save', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, url, type})});
    alert("Saved!");
}

async function loadFavs() {
    const res = await fetch('/api/get_favs');
    const data = await res.json();
    document.getElementById('favList').innerHTML = data.map(f => `
        <div class="fav-item">
            <p class="mb-1 fw-bold small">${f.title}</p>
            <a href="${f.url}" target="_blank" class="btn btn-sm btn-link p-0 text-decoration-none">Open Link</a>
        </div>
    `).join('');
}

function preview(url, type, title) {
    document.getElementById('vTitle').innerText = title;
    document.getElementById('vFrame').src = type === 'pdf' ? `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true` : `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(url)}`;
    vModal.show();
}
</script>
</body>
</html>
