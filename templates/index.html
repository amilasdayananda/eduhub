<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduHub Pro | Advanced Filters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #4f46e5; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        
        /* Dashboard Header */
        .dashboard-nav {
            position: sticky; top: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid #e2e8f0;
            padding: 20px 0; z-index: 1000;
        }
        .search-wrap { background: #fff; border-radius: 50px; border: 1px solid #cbd5e1; padding: 10px 25px; max-width: 700px; margin: 0 auto; }
        .search-wrap input { border: none; outline: none; width: 100%; font-size: 1.1rem; }

        /* Filter Pills */
        .filter-pill { cursor: pointer; padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; border: 1px solid #e2e8f0; background: #fff; transition: 0.3s; color: #64748b; }
        .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        .res-card { background: #fff; border-radius: 20px; padding: 20px; border: 1px solid #f1f5f9; height: 100%; transition: 0.3s; }
        .res-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        
        .icon-box { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-bottom: 15px; }
        .bg-pdf { background: #fef2f2; color: #ef4444; }
        .bg-excel { background: #f0fdf4; color: #22c55e; }
        .bg-document { background: #eff6ff; color: #3b82f6; }
        .bg-web { background: #f5f3ff; color: #7c3aed; }
        .bg-video { background: #fff7ed; color: #f97316; }
    </style>
</head>
<body>

<div class="dashboard-nav shadow-sm">
    <div class="container text-center">
        <h4 class="fw-bold mb-3">EduHub Resources</h4>
        <div class="search-wrap d-flex align-items-center mb-3">
            <input type="text" id="qInput" placeholder="Enter topic (e.g. 'Project Management')">
        </div>
        
        <div class="d-flex justify-content-center gap-2 mb-3">
            <div class="filter-pill active level-p" onclick="setType(this, 'level', 'Beginner')">Beginner</div>
            <div class="filter-pill level-p" onclick="setType(this, 'level', 'Intermediate')">Intermediate</div>
            <div class="filter-pill level-p" onclick="setType(this, 'level', 'Expert')">Expert</div>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <div class="filter-pill active type-p" onclick="setType(this, 'type', 'all')">All Results</div>
            <div class="filter-pill type-p" onclick="setType(this, 'type', 'pdf')"><i class="bi bi-file-pdf me-1"></i>PDF</div>
            <div class="filter-pill type-p" onclick="setType(this, 'type', 'excel')"><i class="bi bi-file-earmark-excel me-1"></i>Excel</div>
            <div class="filter-pill type-p" onclick="setType(this, 'type', 'document')"><i class="bi bi-file-word me-1"></i>Docs</div>
            <div class="filter-pill type-p" onclick="setType(this, 'type', 'web')"><i class="bi bi-globe me-1"></i>Web</div>
        </div>
    </div>
</div>

<div class="container py-5">
    <div id="grid" class="row g-4"></div>
</div>

<script>
let state = { q: '', level: 'Beginner', type: 'all' };
const input = document.getElementById('qInput');
const grid = document.getElementById('grid');

function setType(el, category, val) {
    const selector = category === 'level' ? '.level-p' : '.type-p';
    document.querySelectorAll(selector).forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    state[category] = val;
    if(state.q.length > 2) performSearch();
}

input.addEventListener('input', (e) => {
    state.q = e.target.value;
    if(state.q.length < 3) return;
    clearTimeout(window.sTimer);
    window.sTimer = setTimeout(performSearch, 700);
});

async function performSearch() {
    grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary mb-3"></div><p>Filtering Global Databases...</p></div>';
    
    const url = `/api/search?q=${encodeURIComponent(state.q)}&level=${state.level}&type=${state.type}`;
    const res = await fetch(url);
    const data = await res.json();
    
    grid.innerHTML = data.map(item => `
        <div class="col-md-6 col-lg-4">
            <div class="res-card shadow-sm">
                <div class="icon-box bg-${item.type}">
                    <i class="bi ${getIcon(item.type)}"></i>
                </div>
                <h6 class="fw-bold mb-1">${item.title}</h6>
                <div class="mt-3">
                    <span class="badge bg-light text-dark border">${item.type.toUpperCase()}</span>
                    <span class="badge bg-indigo-50 text-indigo-700">${item.level}</span>
                </div>
                <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm rounded-pill w-100 mt-3">Open</a>
            </div>
        </div>
    `).join('');
}

function getIcon(type) {
    const map = {'pdf': 'bi-file-pdf', 'excel': 'bi-file-earmark-excel', 'document': 'bi-file-word', 'web': 'bi-globe', 'video': 'bi-play-circle'};
    return map[type] || 'bi-journal-text';
}
</script>
</body>
</html>
