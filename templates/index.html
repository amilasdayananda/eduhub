<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduFlow Pro | RelyByte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #4f46e5; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Glass Navbar */
        .search-bar-fixed {
            position: sticky; top: 0; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0;
            padding: 20px 0; z-index: 1000;
        }
        .search-box {
            background: #fff; border-radius: 50px; border: 1px solid #cbd5e1;
            padding: 10px 25px; max-width: 800px; margin: 0 auto;
        }
        .search-box input { border: none; outline: none; width: 100%; font-size: 1.1rem; }

        /* Level Pills */
        .level-pill { cursor: pointer; padding: 6px 20px; border-radius: 50px; font-weight: 600; font-size: 0.8rem; transition: 0.3s; border: 1px solid #e2e8f0; background: white; }
        .level-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Format Cards */
        .res-card {
            background: white; border-radius: 24px; padding: 25px; height: 100%;
            border: 1px solid #f1f5f9; transition: 0.4s;
        }
        .res-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .icon-circle { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 20px; }
        .bg-pdf { background: #fee2e2; color: #ef4444; }
        .bg-excel { background: #f0fdf4; color: #22c55e; }
        .bg-web { background: #eff6ff; color: #3b82f6; }
        .bg-video { background: #fff7ed; color: #f97316; }
    </style>
</head>
<body>

<div class="search-bar-fixed">
    <div class="container text-center">
        <h3 class="fw-bold mb-3">EduFlow Pro.</h3>
        <div class="search-box d-flex align-items-center mb-3">
            <i class="bi bi-search me-2 text-muted"></i>
            <input type="text" id="qInput" placeholder="Search Python, Excel, Business...">
        </div>
        <div class="d-flex justify-content-center gap-2">
            <div class="level-pill active" onclick="setLevel(this, 'Beginner')">Beginner</div>
            <div class="level-pill" onclick="setLevel(this, 'Intermediate')">Intermediate</div>
            <div class="level-pill" onclick="setLevel(this, 'Expert')">Expert</div>
        </div>
    </div>
</div>

<div class="container py-5">
    <div id="grid" class="row g-4"></div>
</div>

<script>
let currentLevel = 'Beginner';
const input = document.getElementById('qInput');
const grid = document.getElementById('grid');

function setLevel(el, level) {
    document.querySelectorAll('.level-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    currentLevel = level;
    if(input.value.length > 2) performSearch();
}

input.addEventListener('input', () => {
    if(input.value.length < 3) return;
    clearTimeout(window.sTimer);
    window.sTimer = setTimeout(performSearch, 800);
});

async function performSearch() {
    grid.innerHTML = '<div class="col-12 text-center text-muted"><h4>Connecting to Global Repositories...</h4></div>';
    const q = input.value.trim();
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&level=${currentLevel}`);
    const data = await res.json();
    
    grid.innerHTML = data.map(item => `
        <div class="col-md-6 col-lg-4">
            <div class="res-card shadow-sm">
                <div class="icon-circle bg-${item.type}">
                    <i class="bi ${getIcon(item.type)}"></i>
                </div>
                <h6 class="fw-bold mb-1">${item.title}</h6>
                <div class="d-flex gap-2 mt-4">
                    <span class="badge bg-light text-dark border">${item.type.toUpperCase()}</span>
                    <span class="badge bg-indigo-100 text-indigo-700">${item.level}</span>
                </div>
                <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm rounded-pill w-100 mt-3">Open Resource</a>
            </div>
        </div>
    `).join('');
}

function getIcon(type) {
    const icons = {'pdf': 'bi-file-pdf', 'excel': 'bi-file-earmark-spreadsheet', 'web': 'bi-globe', 'video': 'bi-play-circle'};
    return icons[type] || 'bi-journal-text';
}
</script>
</body>
</html>
