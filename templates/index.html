<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduFlow | RelyByte Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #4f46e5; --glass: rgba(255, 255, 255, 0.9); }
        body { background: #f3f4f6; font-family: 'Inter', sans-serif; padding-top: 80px; }
        
        /* Fixed Top Search Bar */
        .top-bar { position: fixed; top: 0; width: 100%; background: var(--glass); backdrop-filter: blur(10px); z-index: 1000; padding: 15px 0; border-bottom: 1px solid #e5e7eb; }
        .search-pill { background: #fff; border-radius: 50px; border: 1px solid #d1d5db; padding: 8px 20px; max-width: 600px; margin: 0 auto; transition: 0.3s; }
        .search-pill:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .search-pill input { border: none; outline: none; width: 100%; font-size: 1rem; }

        .card-edu { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 20px; height: 100%; transition: 0.3s; position: relative; }
        .card-edu:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .loading { display: none; text-align: center; padding: 40px; }
        .icon-box { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 1.2rem; }
        .bg-pdf { background: #fee2e2; color: #dc2626; }
        .bg-web { background: #e0f2fe; color: #0284c7; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container d-flex align-items-center">
        <h4 class="fw-bold mb-0 me-4 text-primary">EduFlow</h4>
        <div class="search-pill d-flex align-items-center flex-grow-1">
            <i class="bi bi-search me-2 text-muted"></i>
            <input type="text" id="qInput" placeholder="Search (e.g. 'Python' or 'History')">
        </div>
        <button class="btn btn-dark rounded-pill ms-3" onclick="alert('Favorites system connected!')"><i class="bi bi-heart-fill"></i></button>
    </div>
</div>

<div class="container mt-4">
    <div id="loader" class="loading">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">Connecting to Global Education APIs...</p>
    </div>
    <div id="grid" class="row g-4"></div>
</div>

<script>
const input = document.getElementById('qInput');
const grid = document.getElementById('grid');
const loader = document.getElementById('loader');

input.addEventListener('input', (e) => {
    const q = e.target.value.trim();
    if (q.length < 3) { grid.innerHTML = ''; return; }

    clearTimeout(window.sTimer);
    window.sTimer = setTimeout(async () => {
        loader.style.display = 'block';
        grid.innerHTML = '';
        
        try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            loader.style.display = 'none';

            if (data.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><h5>No data found. Try a different topic.</h5></div>';
                return;
            }

            grid.innerHTML = data.map(item => `
                <div class="col-md-6 col-lg-4">
                    <div class="card-edu shadow-sm">
                        <div class="icon-box bg-${item.file_type === 'pdf' ? 'pdf' : 'web'}">
                            <i class="bi ${item.file_type === 'pdf' ? 'bi-file-earmark-pdf' : 'bi-globe'}"></i>
                        </div>
                        <h6 class="fw-bold mb-1">${item.title}</h6>
                        <p class="small text-muted mb-3">${item.source}</p>
                        <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm rounded-pill w-100">Open Resource</a>
                    </div>
                </div>
            `).join('');
        } catch (err) { loader.style.display = 'none'; }
    }, 800);
});
</script>
</body>
</html>
